[advisories]
# RUSTSEC-2023-0071: Marvin Attack timing side-channel in the `rsa` crate.
# No patched version is available upstream (patched = [], unaffected = []).
#
# The `rsa` crate appears in Cargo.lock only as an optional transitive
# dependency: sqlx -> sqlx-mysql (optional) -> rsa. This project uses
# sqlx with SQLite only (the `mysql` feature is not enabled), so the
# vulnerable RSA code is never compiled into any binary. The timing
# attack vector therefore does not apply to this project.
ignore = ["RUSTSEC-2023-0071"]

# Treat unmaintained crates as warnings (not build failures).
# - bincode 1.3.3 (RUSTSEC-2025-0141): pulled in by yew -> gloo -> gloo-worker
# - proc-macro-error 1.0.4 (RUSTSEC-2024-0370): pulled in by yew -> yew-macro
# Both crates are compile-time / optional dependencies that pose no runtime risk.
informational_warnings = ["unmaintained"]
